<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h2>Login</h2>
    <form method="POST">
        Username: <input name="username" value="{{ request.form.username }}" required><br>
        Password: <input name="password" type="password" required><br>
        <input type="submit" value="Login">
    </form>

    <p>{{ message }}</p>

</body>
</html>
