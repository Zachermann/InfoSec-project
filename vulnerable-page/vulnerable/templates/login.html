<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h2>Login</h2>
    <form method="POST">
        Username: <input name="username" value="{{ request.form.username }}" required><br>
        Password: <input name="password" type="password" value="{{ request.form.password }}" required><br>
        <input type="submit" value="Login">
    </form>

    <p>{{ message }}</p>

    {% if show_users_table %}
    <h2>Users Table</h2>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Password</th>
        </tr>
        {% for user in users %}
        <tr>
            <td>{{ user[0] }}</td>
            <td>{{ user[1] }}</td>
            <td>{{ user[2] }}</td>
        </tr>
        {% endfor %}
    </table>
    {% endif %}
</body>
</html>
